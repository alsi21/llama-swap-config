models:
  sw3-20B-instruct:
    proxy: "http://host.docker.internal:${PORT}"
    useModelName: "AI-Sweden-Models/gpt-sw3-20b-instruct"
    cmd: >
      docker run 
      --runtime nvidia 
      --gpus all
      --name ${MODEL_ID}
      --rm
      -p ${PORT}:5800
      -v C:/Users/albin/Documents/Projects/llm/models:/models
      ghcr.io/ggml-org/llama.cpp:server-cuda
      -m /models/sw3-20B-instruct/gpt-sw3-20b-instruct-Q4_K_M.gguf
      -c 512
      --port 5800
      --n-gpu-layers 99
      --chat-template /models/sw3-20B-instruct/chat_template.jinja
    cmdStop: docker stop ${MODEL_ID}
