      --gpus all
      --name ${MODEL_ID}
      --rm
      --init
      -v C:/Users/albin/Documents/Projects/llm/models:/models
      --env "HF_TOKEN=$HF_TOKEN" 
      -p ${PORT}:8000
      vllm/vllm-openai:v0.14.1 
      --model /models/sw3-20B-instruct
      --tokenizer AI-Sweden-Models/gpt-sw3-20b-instruct
      --hf-config-path AI-Sweden-Models/gpt-sw3-20b-instruct
    cmdStop: docker stop ${MODEL_ID}

